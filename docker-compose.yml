version: '3.9'

services:
  postgres:
    image: timescale/timescaledb-ha:pg16
    container_name: mundurovehdb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: munduro
      POSTGRES_PASSWORD: MunduroStrongPass2026!
      POSTGRES_DB: mundurovehdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U munduro"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
